<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Login | ArticleInsight</title><link rel="stylesheet" href="assets/style.css"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"><script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script></head><body><nav class="nav"><div class="container navin glass"><a class="brand" href="index.html">Article<span>Insight</span></a><div class="navlinks"><a href="index.html">Home</a><a href="index.html#articles">Articles</a><a href="submit.html">Submit Article</a><a href="dashboard.html">Dashboard</a><a href="login.html" id="authLink" class="btn btn-primary">Login</a></div><a href="submit.html" class="btn btn-primary mobile">Submit</a></div></nav><main class="container"><div class="form-wrap glass"><span class="eyebrow">Writer access</span><h2 id="title">Login to ArticleInsight</h2><p class="muted">Access your dashboard and manage article submissions.</p><div id="msg"></div><div class="field"><label>Name (required for registration)</label><input class="input" id="name" placeholder="Your name"></div><div class="field"><label>Email</label><input class="input" id="email" type="email" placeholder="you@example.com"></div><div class="field"><label>Password</label><input class="input" id="password" type="password" placeholder="Minimum 6 characters"></div><button class="btn btn-primary" id="submit" style="width:100%">Login</button><button class="btn btn-ghost" id="toggle" style="width:100%;margin-top:10px">Create a new account</button></div></main><script>
const firebaseConfig = {
  apiKey: "AIzaSyCwZQI1fDJJ88coWxoaWOQy8sSeV7PMl8U",
  authDomain: "articleinsight-e4f09.firebaseapp.com",
  projectId: "articleinsight-e4f09",
  storageBucket: "articleinsight-e4f09.firebasestorage.app",
  messagingSenderId: "109524893167",
  appId: "1:109524893167:web:e1999864cd80df181fca1a",
  measurementId: "G-099HTD2YK4"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

let register=false;const msg=document.getElementById('msg');document.getElementById('toggle').onclick=()=>{register=!register;document.getElementById('title').textContent=register?'Create your writer account':'Login to ArticleInsight';document.getElementById('submit').textContent=register?'Register':'Login';document.getElementById('toggle').textContent=register?'Already have an account? Login':'Create a new account'};
document.getElementById('submit').onclick=async()=>{msg.innerHTML='';const email=document.getElementById('email').value.trim(),pass=document.getElementById('password').value,name=document.getElementById('name').value.trim();try{let c;if(register){if(!name)throw new Error('Please enter your name.');c=await auth.createUserWithEmailAndPassword(email,pass);await c.user.updateProfile({displayName:name});await db.collection('users').doc(c.user.uid).set({name,email,role:'author',createdAt:firebase.firestore.FieldValue.serverTimestamp()})}else c=await auth.signInWithEmailAndPassword(email,pass);location.href='dashboard.html'}catch(e){msg.innerHTML=`<div class="notice error">${e.message}</div>`}}
</script></body></html>

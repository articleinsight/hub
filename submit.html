<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Submit Article | ArticleInsight</title><link rel="stylesheet" href="assets/style.css"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"><script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script></head><body><nav class="nav"><div class="container navin glass"><a class="brand" href="index.html">Article<span>Insight</span></a><div class="navlinks"><a href="index.html">Home</a><a href="index.html#articles">Articles</a><a href="submit.html">Submit Article</a><a href="dashboard.html">Dashboard</a><a href="login.html" id="authLink" class="btn btn-primary">Login</a></div><a href="submit.html" class="btn btn-primary mobile">Submit</a></div></nav><main class="container"><div class="form-wrap glass"><span class="eyebrow">Contributor portal</span><h2>Submit a New Article</h2><p class="muted">Your article will be reviewed by an administrator before it appears publicly.</p><div id="msg"></div><div class="field"><label>Article title</label><input id="title" class="input" maxlength="120"></div><div class="form-grid"><div class="field"><label>Category</label><select id="category" class="select"><option>Technology</option><option>Business</option><option>Health & Wellness</option><option>Education</option><option>Travel</option><option>Finance</option><option>Lifestyle</option><option>Digital Marketing</option><option>Science</option><option>Environment</option><option>News & Trends</option><option>General</option></select></div><div class="field"><label>Featured image (optional)</label><input id="image" class="input" type="file" accept="image/*"></div></div><div class="field"><label>Short excerpt</label><textarea id="excerpt" class="textarea" maxlength="300"></textarea></div><div class="field"><label>Article content</label><textarea id="content" class="textarea" style="min-height:340px" placeholder="Write your full article here. Basic HTML such as <h2>, <p>, <ul> and <strong> is supported."></textarea></div><button id="publish" class="btn btn-primary" style="width:100%">Submit for Review</button></div></main><script>
const firebaseConfig = {
  apiKey: "AIzaSyCwZQI1fDJJ88coWxoaWOQy8sSeV7PMl8U",
  authDomain: "articleinsight-e4f09.firebaseapp.com",
  projectId: "articleinsight-e4f09",
  storageBucket: "articleinsight-e4f09.firebasestorage.app",
  messagingSenderId: "109524893167",
  appId: "1:109524893167:web:e1999864cd80df181fca1a",
  measurementId: "G-099HTD2YK4"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

let user;auth.onAuthStateChanged(u=>{if(!u)location.href='login.html';else user=u});document.getElementById('publish').onclick=async()=>{const btn=document.getElementById('publish'),msg=document.getElementById('msg');try{btn.disabled=true;btn.textContent='Submitting...';const title=document.getElementById('title').value.trim(),content=document.getElementById('content').value.trim();if(title.length<8||content.length<150)throw new Error('Please provide a clear title and at least 150 characters of content.');let imageUrl='';const file=document.getElementById('image').files[0];if(file){if(file.size>5*1024*1024)throw new Error('Image must be under 5 MB.');const ref=storage.ref(`article-images/${user.uid}/${Date.now()}-${file.name.replace(/[^a-z0-9.\-_]/gi,'-')}`);await ref.put(file);imageUrl=await ref.getDownloadURL()}await db.collection('articles').add({title,category:document.getElementById('category').value,excerpt:document.getElementById('excerpt').value.trim(),content,imageUrl,status:'pending',authorId:user.uid,authorName:user.displayName||user.email.split('@')[0],authorEmail:user.email,createdAt:firebase.firestore.FieldValue.serverTimestamp(),updatedAt:firebase.firestore.FieldValue.serverTimestamp()});msg.innerHTML='<div class="notice success">Article submitted successfully. It is now waiting for admin review.</div>';document.querySelectorAll('input,textarea').forEach(x=>{if(x.type!=='file')x.value=''})}catch(e){msg.innerHTML=`<div class="notice error">${e.message}</div>`}finally{btn.disabled=false;btn.textContent='Submit for Review'}}
</script></body></html>

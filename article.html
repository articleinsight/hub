function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function sanitize(html){const t=document.createElement('template');t.innerHTML=html;[...t.content.querySelectorAll('script,iframe,object,embed,form,input,button')].forEach(n=>n.remove());[...t.content.querySelectorAll('*')].forEach(el=>[...el.attributes].forEach(a=>{if(/^on/i.test(a.name)||/javascript:/i.test(a.value))el.removeAttribute(a.name)}));return t.innerHTML}const id=new URLSearchParams(location.search).get('id');if(!id)document.getElementById('article').innerHTML='<div class="empty">Article not found.</div>';else db.collection('articles').doc(id).get().then(d=>{if(!d.exists||d.data().status!=='published')throw 0;const p=d.data();document.title=p.title+' | ArticleInsight';document.querySelector('meta[name="description"]').content=p.excerpt||'Read this article on ArticleInsight.';document.getElementById('article').innerHTML=`<header class="article-head glass"><div class="tag">${esc(p.category)}</div><h1>${esc(p.title)}</h1><p class="muted">By ${esc(p.authorName)} · ${p.createdAt?.toDate?p.createdAt.toDate().toLocaleDateString():''}</p></header>${p.imageUrl?`<img class="article-image" src="${esc(p.imageUrl)}" alt="${esc(p.title)}">`:''}<article class="article-body">${sanitize(p.content)}</article>`}).catch(()=>document.getElementById('article').innerHTML='<div class="empty">This article is unavailable or has not been published.</div>')
